{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="p-4 glass-card" style="
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.13);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    ">
      <h3 class="text-white fw-semibold text-center mb-4">
        {% if form.instance.pk %}Edit{% else %}Add{% endif %} Study Session
      </h3>

      <form method="POST">
        {% csrf_token %}

        {% if form.errors %}
        <div class="alert" style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; border-radius: 10px; font-size: 0.85rem;">
          Please fix the errors below.
        </div>
        {% endif %}

        <div class="mb-3">
          <label class="form-label" style="color: rgba(255,255,255,0.75); font-size: 0.85rem;">Subject</label>
          {{ form.subject }}
        </div>

        <div class="mb-3">
          <label class="form-label" style="color: rgba(255,255,255,0.75); font-size: 0.85rem;">Hours</label>
          {{ form.hours }}
        </div>


        <button type="submit" class="btn w-100 btn-save-session"
          style="background: #2563eb; color: white; border-radius: 10px; padding: 10px; font-size: 0.9rem; border: none;">
          Save Session
        </button>
      </form>
    </div>
  </div>
</div>

<style>
  /* Input fields */
  .form-control {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.18) !important;
    color: white !important;
    border-radius: 10px !important;
    padding: 10px 14px !important;
    transition: all 0.2s ease;
    width: 100%;
    display: block;
  }
  .form-control::placeholder { color: rgba(255,255,255,0.35); }
  .form-control:hover {
    border-color: rgba(255,255,255,0.45) !important;
    background: rgba(255,255,255,0.12) !important;
  }
  .form-control:focus {
    background: rgba(255,255,255,0.14) !important;
    border-color: rgba(99,179,237,0.7) !important;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.25) !important;
    color: white !important;
  }

  /* Django auto-generated inputs (select, textarea, etc.) */
  input[type="text"],
  input[type="number"],
  input[type="date"],
  select, textarea {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.18) !important;
    color: white !important;
    border-radius: 10px !important;
    padding: 10px 14px !important;
    width: 100%;
    display: block;
    transition: all 0.2s ease;
  }
  input[type="text"]:hover,
  input[type="number"]:hover,
  input[type="date"]:hover,
  select:hover, textarea:hover {
    border-color: rgba(255,255,255,0.45) !important;
    background: rgba(255,255,255,0.12) !important;
  }
  input[type="text"]:focus,
  input[type="number"]:focus,
  input[type="date"]:focus,
  select:focus, textarea:focus {
    background: rgba(255,255,255,0.14) !important;
    border-color: rgba(99,179,237,0.7) !important;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.25) !important;
    outline: none !important;
    color: white !important;
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1) opacity(0.6);
  }

  /* Labels */
  label.form-label {
    transition: color 0.2s ease;
    cursor: default;
  }
  label.form-label:hover {
    color: rgba(255,255,255,1) !important;
  }

  /* Save button */
  .btn-save-session {
    transition: all 0.2s ease;
  }
  .btn-save-session:hover {
    background: #1d4ed8 !important;
    transform: scale(1.02);
    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.5);
  }

  /* Glass card */
  .glass-card {
    transition: box-shadow 0.2s ease;
  }
  .glass-card:hover {
    box-shadow: 0 12px 50px rgba(0,0,0,0.5) !important;
  }
</style>

{% endblock %}
