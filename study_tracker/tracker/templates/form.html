{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="p-4" style="
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.13);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    ">
      <h3 class="text-white fw-semibold text-center mb-4">
        {% if form.instance.pk %}Edit{% else %}Add{% endif %} Study Session
      </h3>
      <form method="POST">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert" style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; border-radius: 10px; font-size: 0.85rem;">
          Please fix the errors below.
        </div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label" style="color: rgba(255,255,255,0.75); font-size: 0.85rem;">Subject</label>
          {{ form.subject }}
        </div>
        <div class="mb-3">
          <label class="form-label" style="color: rgba(255,255,255,0.75); font-size: 0.85rem;">Hours</label>
          {{ form.hours }}
        </div>
        <div class="mb-4">
          <label class="form-label" style="color: rgba(255,255,255,0.75); font-size: 0.85rem;">Date</label>
          {{ form.date }}
        </div>
        <button type="submit" class="btn w-100"
          style="background: #2563eb; color: white; border-radius: 10px; padding: 10px; font-size: 0.9rem; border: none;">
          Save Session
        </button>
      </form>
    </div>
  </div>
</div>

<style>
  input[type="text"], input[type="number"], input[type="date"], select, textarea {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.18) !important;
    color: white !important;
    border-radius: 10px !important;
    padding: 10px 14px !important;
    width: 100%;
    display: block;
  }
  input::placeholder { color: rgba(255,255,255,0.4); }
  input:focus, select:focus {
    outline: none;
    background: rgba(255,255,255,0.12) !important;
    border-color: rgba(255,255,255,0.3) !important;
    box-shadow: none !important;
  }
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(1) opacity(0.6);
  }
</style>
{% endblock %}
