<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body { font-family: 'Segoe UI', sans-serif; }
.nav-btn-sessions {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.25);
  color: white;
  border-radius: 10px;
  padding: 6px 16px;
  font-size: 0.875rem;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  text-decoration: none;
  transition: background 0.2s;
}
.nav-btn-sessions:hover { background: rgba(255,255,255,0.22); color: white; }
.nav-btn-logout {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.35);
  color: white;
  border-radius: 10px;
  padding: 6px 16px;
  font-size: 0.875rem;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  text-decoration: none;
  transition: background 0.2s;
}
.nav-btn-logout:hover { background: rgba(255,255,255,0.1); color: white; }
</style>
</head>
<body class="d-flex flex-column min-vh-100"
  style="
    background: url('https://images.unsplash.com/photo-1492724441997-5dc865305da7') no-repeat center center fixed;
    background-size: cover;
  ">

<div style="
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65));
  z-index: -1;
"></div>

<div class="container mt-3">
  <nav class="navbar navbar-expand-lg px-4 py-2"
    style="
      backdrop-filter: blur(8px);
      background: rgba(0,0,0,0.45);
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    ">
    <div class="container-fluid">
      <a class="navbar-brand text-white fw-semibold fs-5" href="{% url 'session_list' %}">
        StudyTracker
      </a>
      <div class="d-flex align-items-center gap-2">
        {% if user.is_authenticated %}
          <span class="text-white me-2" style="font-size: 0.9rem;">{{ user.username }}</span>
          <a href="{% url 'session_list' %}" class="nav-btn-sessions">
            <i class="bi bi-grid" style="font-size: 0.9rem;"></i> Sessions
          </a>
          <a href="{% url 'logout' %}" class="nav-btn-logout">
            <i class="bi bi-box-arrow-right" style="font-size: 0.9rem;"></i> Logout
          </a>
        {% else %}
          <a href="{% url 'login' %}" class="nav-btn-logout">
            <i class="bi bi-box-arrow-in-right" style="font-size: 0.9rem;"></i> Login
          </a>
          <a href="{% url 'sign_up' %}" class="nav-btn-sessions">
            <i class="bi bi-person-plus" style="font-size: 0.9rem;"></i> Sign Up
          </a>
        {% endif %}
      </div>
    </div>
  </nav>
</div>

<div class="container mt-5 flex-grow-1">
  {% block content %}{% endblock %}
</div>

<footer class="text-center py-3 mt-auto"
  style="backdrop-filter: blur(10px); background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.6); font-size: 0.82rem;">
  © {% now "Y" %} StudyTracker developed by Django - Bishwojit
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
