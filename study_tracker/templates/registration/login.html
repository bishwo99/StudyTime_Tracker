{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="p-4" style="
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.13);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    ">
      <h3 class="text-white fw-semibold text-center mb-4">Login</h3>

      <form method="POST">
        {% csrf_token %}

        {% if form.errors %}
        <div class="alert" style="background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #fca5a5; border-radius: 10px; font-size: 0.85rem;">
          Invalid username or password
        </div>
        {% endif %}

        <div class="mb-3">
          <input type="text" name="username" class="form-control" placeholder="Username">
        </div>

        <div class="mb-4">
          <input type="password" name="password" class="form-control" placeholder="Password">
        </div>

        <button class="btn w-100"
          style="background: #2563eb; color: white; border-radius: 10px; padding: 10px; font-size: 0.9rem; border: none; transition: all 0.2s ease;"
          onmouseover="this.style.background='#1d4ed8'; this.style.transform='scale(1.02)'; this.style.boxShadow='0 4px 20px rgba(37,99,235,0.5)'"
          onmouseout="this.style.background='#2563eb'; this.style.transform='scale(1)'; this.style.boxShadow='none'">
          Login
        </button>

        <p class="text-center mt-3 mb-0" style="color: rgb(255, 255, 255); font-size: 0.85rem;">
          Don't have an account?
          <a href="{% url 'sign_up' %}" style="color: #60a5fa; text-decoration: none; transition: color 0.2s;"
            onmouseover="this.style.color='#93c5fd'"
            onmouseout="this.style.color='#60a5fa'">
            Sign Up
          </a>
        </p>

      </form>
    </div>
  </div>
</div>

<style>
  .form-control {
    background: rgba(255,255,255,0.08) !important;
    border: 1px solid rgba(255,255,255,0.18) !important;
    color: white !important;
    border-radius: 10px !important;
    padding: 10px 14px !important;
    transition: all 0.2s ease;
  }
  .form-control::placeholder { color: rgba(255,255,255,0.4); }
  .form-control:hover {
    border-color: rgba(255,255,255,0.45) !important;
    background: rgba(255,255,255,0.12) !important;
  }
  .form-control:focus {
    background: rgba(255,255,255,0.14) !important;
    border-color: rgba(99,179,237,0.7) !important;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.25) !important;
    color: white !important;
  }
</style>

{% endblock %}
